name: 術語建議
description: 建議新增或修改 Glossary 中的術語條目
title: "[Term] "
labels: ["content", "glossary"]
body:
  - type: markdown
    attributes:
      value: |
        感謝你想協助擴充術語表。提交前請先確認此術語：
        - 尚未存在於 [現有術語表](https://kinkref.org/glossary)
        - 屬於 BDSM 學術文獻範圍（不是俚語或非學術社群用語）
        - 有可考的英文原文（不是純中文圈造詞）

        如果你想直接撰寫條目，請參考 [CONTRIBUTING.md](https://github.com/NonTricker/kinkref_org/blob/main/CONTRIBUTING.md)
        並用 PR 提交。

  - type: input
    id: term-en
    attributes:
      label: 英文術語
      description: 標準拼法（如：Aftercare）
      placeholder: e.g., Aftercare
    validations:
      required: true

  - type: input
    id: term-zh
    attributes:
      label: 建議的中文翻譯
      description: 如果有多種譯法，請列出，並標示主要建議
      placeholder: e.g., 事後照護
    validations:
      required: true

  - type: textarea
    id: tagline
    attributes:
      label: 一句話定義（≤30 字）
      placeholder: 場景結束後對參與者進行的情緒、生理與關係照護。
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: 學術文獻來源
      description: DOI、書名、或其他可考來源。社群口傳請註明。
      placeholder: |
        - Wismeijer & van Assen (2013). DOI: 10.1111/j.1743-6109.2012.02922.x
        - 或：圈內口傳，無正式文獻
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 補充說明
      description: 任何想補充的辨析、爭議、或使用脈絡
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: 確認事項
      options:
        - label: 我確認這個術語不是純情色或操作性內容
          required: true
        - label: 我同意以 CC BY-SA 4.0 授權貢獻此建議
          required: true
