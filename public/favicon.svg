<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Kink Reference">
  <style>
    .a { fill: #7A1D1D; }
    @media (prefers-color-scheme: dark) {
      .a { fill: #C25555; }
    }
  </style>
  <!-- Hairlines (兩側裝飾飾線) -->
  <rect class="a" x="6" y="198.5" width="16" height="1.5"/>
  <rect class="a" x="198" y="198.5" width="16" height="1.5"/>
  <!-- K stem -->
  <path class="a" d="M 28 24 L 56 24 L 56 30 C 54 30, 52 32, 52 36 L 52 184 C 52 188, 54 190, 56 190 L 56 196 L 28 196 L 28 190 C 30 190, 36 188, 36 184 L 36 36 C 36 32, 30 30, 28 30 Z"/>
  <!-- R stem -->
  <path class="a" d="M 62 24 L 90 24 L 90 30 C 88 30, 82 32, 82 36 L 82 184 C 82 188, 88 190, 90 190 L 90 196 L 62 196 L 62 190 C 64 190, 66 188, 66 184 L 66 36 C 66 32, 64 30, 62 30 Z"/>
  <!-- R bowl -->
  <path class="a" d="M 82 30 C 122 28, 156 38, 162 60 C 166 88, 128 110, 82 110 L 82 96 C 122 96, 152 80, 146 62 C 139 50, 120 44, 82 42 Z"/>
  <!-- K leg -->
  <path class="a" d="M 52 102 C 78 130, 108 158, 132 184 L 140 188 L 134 196 C 108 168, 78 144, 52 118 Z"/>
  <!-- R leg -->
  <path class="a" d="M 82 102 C 106 130, 142 158, 175 184 L 184 188 L 178 196 C 142 168, 106 144, 82 118 Z"/>
  <!-- K upper arm (drawn last, on top — crossover R bowl + R stem) -->
  <path class="a" d="M 52 100 C 88 80, 130 55, 165 30 L 178 32 L 174 40 C 138 60, 94 88, 52 118 Z"/>
  <!-- Cuffs (環繞 leg 末端) -->
  <rect class="a" x="125" y="190" width="20" height="10" rx="2"/>
  <rect class="a" x="168" y="190" width="20" height="10" rx="2"/>
  <!-- Connecting line (兩 cuff 之間) -->
  <rect class="a" x="145" y="198.5" width="23" height="1.5"/>
</svg>
